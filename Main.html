<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viplov Kumar Kashyap | Portfolio</title>
    <!-- Icons and Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --text: #f8fafc;
            /* Theme Variables */
            --l: #8825ec;
            --b: #0a0a0c;
            --c: #fffdfd;
            --w: 104px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--b);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- ANIMATED CHEVRON BACKGROUND --- */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: var(--b);
            background-image: 
                linear-gradient(45deg, var(--l) 0% 14.2%, transparent 14.2% 28.5%, var(--l) 28.5% 42.8%, transparent 42.8% 57.1%, var(--l) 57.1% 71.4%, transparent 71.4% 85.7%, var(--l) 85.7% 100%),
                linear-gradient(-45deg, var(--l) 0% 14.2%, transparent 14.2% 28.5%, var(--l) 28.5% 42.8%, transparent 42.8% 57.1%, var(--l) 57.1% 71.4%, transparent 71.4% 85.7%, var(--l) 85.7% 100%);
            background-size: 50px 20px, 50px 20px, 50px 80px, 50px 80px, 50px 80px, 50px 80px, 50px 80px, 50px 80px;
            background-position-x: 4px, 54px, calc(var(--w) * 1 + 4px), calc(var(--w) * 1 + 54px), calc(var(--w) * 2 + 4px), calc(var(--w) * 2 + 54px);
            background-repeat: repeat-y;
            animation: weee 10s linear infinite;
        }

        .animated-bg::after {
            content: ""; position: absolute; inset: 0;
            animation: after-anim-opacity 5s linear infinite, weee 10s linear infinite;
            background-repeat: repeat-y;
            background-size: inherit; background-position-x: inherit;
            background-image: none, none, 
                linear-gradient(45deg, var(--c) 0% 30.7%, transparent 30.7% 61.5%, var(--c) 61.5% 92.3%, transparent 92.3%),
                linear-gradient(-45deg, var(--c) 0% 30.7%, transparent 30.7% 61.5%, var(--c) 61.5% 92.3%, transparent 92.3%);
        }

        @keyframes weee { to { background-position-y: 800px, 800px, 1040px, 1040px; } }
        @keyframes after-anim-opacity { 5% { opacity: 1; } 0%, 4.99%, 20%, 100% { opacity: 0; } }

        /* --- UI LAYOUT --- */
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            margin-bottom: 2.5rem;
            transition: all 0.3s ease;
        }

        /* --- THEME TOGGLE --- */
        .theme-switch-wrapper { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; align-items: center; gap: 10px; }
        .toggle { width: 50px; height: 26px; background-color: #333; border-radius: 50px; cursor: pointer; display: flex; align-items: center; padding: 0 4px; position: relative; }
        .toggle__circle { width: 20px; height: 20px; background-color: white; border-radius: 50%; transition: transform 0.3s; }
        #check:checked + .toggle > .toggle__circle { transform: translateX(22px); }
        body.light-mode { --b: #f8fafc; --text: #0f172a; }
        body.light-mode .card { background: rgba(255, 255, 255, 0.9); color: #1e293b; }

        /* --- BRUTALIST CONTACT --- */
        .brutalist-container { position: relative; width: 100%; max-width: 500px; margin-bottom: 40px; font-family: monospace; }
        .brutalist-input { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: 4px solid #000; outline: none; background: #fff; color: #000; box-shadow: 5px 5px 0 #000; }
        .brutalist-label { position: absolute; left: -3px; top: -30px; font-size: 14px; font-weight: bold; color: #fff; background: #000; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<!-- Theme Switcher -->
<div class="theme-switch-wrapper">
    <input hidden id="check" type="checkbox">
    <label class="toggle" for="check"><div class="toggle__circle"></div></label>
</div>

<div class="main-container">
    <header>
        <p style="text-transform: uppercase; letter-spacing: 4px; color: #818cf8; font-weight: bold;">B.Tech CSE Student</p>
        <h1>Viplov Kumar Kashyap</h1>
        <p style="font-size: 1.2rem; opacity: 0.7;">Code. Art. Innovation.</p>
    </header>

    <div class="card">
        <h2><i class="fas fa-graduation-cap"></i> 2nd Semester @ IEC</h2>
        <p>Currently pursuing B.Tech in CSE (2025-2029). Achieved <strong>7.95 SGPA</strong> in the 1st semester.</p>
    </div>

    <!-- Brutalist Form -->
    <div class="card" style="background: transparent; border: none;">
        <h2 style="margin-bottom: 3.5rem; color: white;">Send a Message</h2>
        <form action="https://formspree.io/f/mqenkqbg" method="POST">
            <div class="brutalist-container">
                <input class="brutalist-input" type="text" name="name" placeholder="NAME" required>
                <label class="brutalist-label">WHO ARE YOU?</label>
            </div>
            <div class="brutalist-container">
                <textarea class="brutalist-input" name="message" placeholder="MESSAGE" required style="height: 100px;"></textarea>
                <label class="brutalist-label">THE MESSAGE</label>
            </div>
            <button type="submit" class="brutalist-input" style="width: auto; background: #6366f1; color: white; cursor: pointer;">SUBMIT</button>
        </form>
    </div>

    <footer style="text-align: center; padding: 2rem; opacity: 0.5;">
        <p>© 2026 Viplov Kumar Kashyap | Visits: <span id="count">0</span></p>
    </footer>
</div>

<script>
    // Theme logic
    const checkbox = document.getElementById('check');
    checkbox.addEventListener('change', () => document.body.classList.toggle('light-mode'));

    // Hit counter
    function cb(response) { document.getElementById('count').innerText = response.value; }
</script>
<script async src="https://api.countapi.xyz/hit/viplovk.github.io/visits?callback=cb"></script>

</body>
</html>
